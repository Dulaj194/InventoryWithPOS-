networks:
  mypos_network:
    driver: bridge

services:
  mysql:
    image: mysql:8.4
    container_name: mypos_mysql
    restart: unless-stopped
    networks:
      - mypos_network
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-your_mysql_root_password_here}
      MYSQL_DATABASE: mypos_system
      MYSQL_USER: mypos_user
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-your_mysql_root_password_here}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7.2-alpine
    container_name: mypos_redis
    restart: unless-stopped
    networks:
      - mypos_network
    command: redis-server --requirepass ${REDIS_PASSWORD:-your_redis_password_here}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db-init:
    build:
      context: ../..
      dockerfile: apps/api-nest/Dockerfile
      target: builder
    container_name: mypos_db_init
    restart: "no"
    networks:
      - mypos_network
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-mysql://root:Dulaj%40@mysql:3306/mypos_system}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_secret}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm run db:generate && npm run db:push:accept-data-loss && npm run db:seed"

  api:
    build:
      context: ../..
      dockerfile: apps/api-nest/Dockerfile
      target: runner
    container_name: mypos_api
    restart: unless-stopped
    networks:
      - mypos_network
    environment:
      NODE_ENV: production
      PORT: ${PORT:-4000}
      API_PREFIX: ${API_PREFIX:-api/v1}
      DATABASE_URL: ${DATABASE_URL:-mysql://root:Dulaj%40@mysql:3306/mypos_system}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_secret}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-superadmin@mypos.local}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-ChangeMe123!}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http'); const req=http.get('http://localhost:4000/api/v1/health', res => process.exit(res.statusCode===200?0:1)); req.on('error', ()=>process.exit(1));\""]
      interval: 15s
      timeout: 5s
      retries: 12
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  web:
    build:
      context: ../..
      dockerfile: apps/web-next/Dockerfile
    container_name: mypos_web
    restart: unless-stopped
    networks:
      - mypos_network
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api/v1}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  ai:
    build:
      context: ../../apps/ai-fastapi
      dockerfile: Dockerfile
    container_name: mypos_ai
    restart: unless-stopped
    networks:
      - mypos_network
    ports:
      - "8001:8001"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:
  redis_data:
